<h1>Dashboard</h1>

Stations
<div *ngFor="let station of stations$ | async">{{station.user.name}} von {{station.name}} ({{station.coordinates.x}}:{{station.coordinates.y}})</div>
<br/>
BuildOrders
<div *ngFor="let order of buildOrders$ | async">{{order.amount}} {{order.what}} noch {{order.remainingTime}} Ticks verbleibend</div>
